---
- name: Deploy URL Shortener
  hosts: app
  become: true
  vars:
    app_dir: /opt/myshortner01
    app_user: shortener
    python_bin: /usr/bin/python3
    venv_dir: /opt/myshortner01/venv

  tasks:
    # ── System packages ──────────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - libpq-dev
          - nginx
          - git
          - curl
          - acl
        state: present

    # ── App user ────────────────────────────────────────────────────────────
    - name: Create app user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/bash
        home: "{{ app_dir }}"
        create_home: yes

    # ── Application code ────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Sync application files
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}"
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=ansible"
          - "--exclude=infra"
          - "--exclude=.udap"
          - "--exclude=.github"
      notify: Restart shortener

    - name: Fix app directory ownership
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # ── Python virtualenv + dependencies ────────────────────────────────────────────
    - name: Create virtualenv
      command: "python3 -m venv {{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        state: present
      become_user: "{{ app_user }}"
      notify: Restart shortener

    # ── Environment file ───────────────────────────────────────────────────────────
    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
        content: |
          DB_HOST={{ db_host }}
          DB_PORT=5432
          DB_NAME=shortener
          DB_USER=shortener
          DB_PASSWORD={{ db_password }}
          BASE_URL=http://{{ ansible_host }}
          DATABASE_URL=postgresql://shortener:{{ db_password }}@{{ db_host }}:5432/shortener
      notify: Restart shortener

    # ── Database migration ────────────────────────────────────────────────────────────
    - name: Run Alembic migrations
      command: "{{ venv_dir }}/bin/alembic upgrade head"
      args:
        chdir: "{{ app_dir }}"
      environment:
        DATABASE_URL: "postgresql://shortener:{{ db_password }}@{{ db_host }}:5432/shortener"
      become_user: "{{ app_user }}"

    # ── Systemd service ─────────────────────────────────────────────────────────────
    - name: Write systemd unit
      copy:
        dest: /etc/systemd/system/shortener.service
        content: |
          [Unit]
          Description=URL Shortener (Gunicorn)
          After=network.target

          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \\
              --workers 2 \\
              --worker-class uvicorn.workers.UvicornWorker \\
              --bind 127.0.0.1:8000 \\
              --access-logfile /var/log/shortener/access.log \\
              --error-logfile /var/log/shortener/error.log
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Restart shortener

    - name: Create log directory
      file:
        path: /var/log/shortener
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Enable and start shortener service
      systemd:
        name: shortener
        enabled: yes
        state: started
        daemon_reload: yes

    # ── Nginx reverse proxy ──────────────────────────────────────────────────────────
    - name: Write nginx site config
      copy:
        dest: /etc/nginx/sites-available/shortener
        content: |
          server {
              listen 80 default_server;
              server_name _;

              access_log /var/log/nginx/shortener_access.log;
              error_log  /var/log/nginx/shortener_error.log;

              location / {
                  proxy_pass         http://127.0.0.1:8000;
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_read_timeout 60s;
              }
          }
      notify: Reload nginx

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/shortener
        dest: /etc/nginx/sites-enabled/shortener
        state: link
      notify: Reload nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure nginx is started and enabled
      systemd:
        name: nginx
        enabled: yes
        state: started

  handlers:
    - name: Restart shortener
      systemd:
        name: shortener
        state: restarted
        daemon_reload: yes

    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded
